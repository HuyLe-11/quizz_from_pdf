<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NetQuiz — Mạng Máy Tính</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0d0f14; --s1:#13161f; --s2:#181c27; --s3:#1e2333;
  --b1:#242a3a; --b2:#2e3650; --b3:#3a4468;
  --acc:#4fc3f7; --acc2:#7c4dff; --acc3:#00e5ff;
  --grn:#00e676; --red:#ff5252; --ylw:#ffea00; --org:#ff9100;
  --txt:#e8edf8; --muted:#6b7799; --dim:#8892b0;
  --r:10px; --r2:14px; --r3:20px;
  --sidebar-w:260px;
  --progress-w:220px;
  --trans: all .18s cubic-bezier(.4,0,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:'Be Vietnam Pro',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
.hdr{
  height:56px;display:flex;align-items:center;gap:14px;
  padding:0 20px;
  background:var(--s1);border-bottom:1px solid var(--b1);
  position:fixed;top:0;left:0;right:0;z-index:200;
}
.hdr-logo{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;color:var(--acc);letter-spacing:-0.5px}
.hdr-logo span{color:var(--acc2)}
.hdr-pill{font-size:.72rem;padding:3px 10px;border-radius:100px;background:var(--s3);border:1px solid var(--b2);color:var(--dim);font-family:'Space Mono',monospace}
.hdr-timer{
  margin-left:auto;
  display:flex;align-items:center;gap:8px;
  font-family:'Space Mono',monospace;font-size:.9rem;font-weight:700;
  color:var(--acc3);
  background:rgba(0,229,255,.07);border:1px solid rgba(0,229,255,.2);
  padding:5px 14px;border-radius:100px;
  cursor:pointer;user-select:none;
}
.hdr-timer.warning{color:var(--ylw);background:rgba(255,234,0,.08);border-color:rgba(255,234,0,.3);animation:pulse 1s infinite}
.hdr-timer.danger{color:var(--red);background:rgba(255,82,82,.1);border-color:rgba(255,82,82,.35);animation:pulse .5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.timer-icon{font-size:1rem}
.sidebar-toggle{
  background:transparent;border:1px solid var(--b2);border-radius:8px;
  color:var(--dim);cursor:pointer;padding:6px 10px;font-size:1rem;
  transition:var(--trans);
}
.sidebar-toggle:hover{color:var(--txt);border-color:var(--b3);background:var(--s3)}

/* ── LAYOUT ── */
.layout{
  display:flex;
  padding-top:56px;
  min-height:100vh;
}
.sidebar{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--s1);border-right:1px solid var(--b1);
  position:fixed;top:56px;left:0;bottom:0;
  overflow-y:auto;z-index:100;
  transition:transform .25s cubic-bezier(.4,0,.2,1);
}
.sidebar.hidden{transform:translateX(-100%)}
.main-wrap{
  flex:1;
  margin-left:var(--sidebar-w);
  margin-right:0;
  transition:margin-left .25s cubic-bezier(.4,0,.2,1);
  min-height:calc(100vh - 56px);
}
.main-wrap.sidebar-hidden{margin-left:0}
.main-wrap.quiz-open{margin-right:var(--progress-w)}

/* Progress panel on right */
.progress-panel{
  width:var(--progress-w);flex-shrink:0;
  background:var(--s1);border-left:1px solid var(--b1);
  position:fixed;top:56px;right:-var(--progress-w);bottom:0;
  overflow-y:auto;z-index:100;
  transition:right .25s cubic-bezier(.4,0,.2,1);
  padding:16px 12px;
}
.progress-panel.visible{right:0}

/* ── SIDEBAR CONTENT ── */
.sb-section{padding:16px 12px 8px}
.sb-label{
  font-family:'Space Mono',monospace;font-size:.65rem;
  text-transform:uppercase;letter-spacing:2px;color:var(--muted);
  margin-bottom:12px;padding:0 6px;
}
.week-btn{
  display:flex;align-items:center;gap:10px;width:100%;
  padding:11px 12px;border-radius:var(--r);border:1px solid transparent;
  background:transparent;color:var(--muted);cursor:pointer;
  text-align:left;font-family:'Be Vietnam Pro',sans-serif;
  font-size:.87rem;margin-bottom:5px;transition:var(--trans);
}
.week-btn:hover{background:var(--s3);color:var(--txt);border-color:var(--b1)}
.week-btn.active{
  background:linear-gradient(135deg,rgba(79,195,247,.1),rgba(124,77,255,.12));
  border-color:rgba(79,195,247,.35);color:var(--acc);
}
.wb-icon{font-size:1.1rem;min-width:24px;text-align:center}
.wb-info{flex:1;min-width:0}
.wb-title{font-weight:600;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wb-sub{font-size:.72rem;color:var(--muted);margin-top:1px}
.week-btn.active .wb-sub{color:rgba(79,195,247,.7)}
.wb-count{
  font-family:'Space Mono',monospace;font-size:.7rem;
  padding:2px 7px;border-radius:100px;
  background:rgba(79,195,247,.1);color:var(--acc);
  flex-shrink:0;
}
.week-btn.active .wb-count{background:rgba(79,195,247,.18)}
.sb-prog{height:2px;background:var(--b1);border-radius:2px;margin-top:6px;overflow:hidden}
.sb-prog-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:2px;transition:width .5s}

.sb-divider{border:none;border-top:1px solid var(--b1);margin:8px 12px}
.sb-stats{padding:12px 18px}
.sb-stat-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--b1);font-size:.82rem}
.sb-stat-row:last-child{border-bottom:none}
.sb-stat-row .lbl{color:var(--muted)}
.sb-stat-row .val{font-family:'Space Mono',monospace;font-weight:700}
.nav-extra-btn{
  display:flex;align-items:center;gap:8px;width:100%;
  padding:9px 12px;border-radius:var(--r);border:1px solid var(--b1);
  background:transparent;color:var(--dim);cursor:pointer;
  font-family:'Be Vietnam Pro',sans-serif;font-size:.84rem;
  transition:var(--trans);margin-bottom:6px;
}
.nav-extra-btn:hover{background:var(--s3);color:var(--txt)}
.nav-extra-btn.active{border-color:rgba(124,77,255,.4);color:var(--acc2);background:rgba(124,77,255,.08)}

/* ── PROGRESS PANEL CONTENT ── */
.pp-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--b1);
}
.pp-header h4{font-family:'Space Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
.pp-close{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:2px 6px;border-radius:6px;transition:var(--trans)}
.pp-close:hover{color:var(--txt);background:var(--s3)}
.pp-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:14px}
.pp-stat{background:var(--s3);border-radius:8px;padding:8px;text-align:center}
.pp-stat .psn{font-family:'Space Mono',monospace;font-size:1.1rem;font-weight:700}
.pp-stat .psl{font-size:.65rem;color:var(--muted);margin-top:2px}
.pp-search{
  width:100%;background:var(--s3);border:1px solid var(--b1);
  color:var(--txt);padding:7px 10px;border-radius:8px;font-size:.8rem;
  font-family:'Be Vietnam Pro',sans-serif;margin-bottom:10px;
  transition:var(--trans);outline:none;
}
.pp-search:focus{border-color:var(--acc);background:var(--s2)}
.pp-search::placeholder{color:var(--muted)}
.q-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px}
.q-dot{
  aspect-ratio:1;border-radius:6px;border:1.5px solid var(--b2);
  background:var(--s3);cursor:pointer;display:flex;align-items:center;
  justify-content:center;font-family:'Space Mono',monospace;font-size:.62rem;
  color:var(--muted);transition:var(--trans);position:relative;
}
.q-dot:hover{border-color:var(--acc);color:var(--txt);transform:scale(1.08)}
.q-dot.current{border-color:var(--acc);background:rgba(79,195,247,.15);color:var(--acc)}
.q-dot.answered{border-color:var(--b3);background:var(--s2);color:var(--dim)}
.q-dot.correct{border-color:var(--grn);background:rgba(0,230,118,.12);color:var(--grn)}
.q-dot.wrong{border-color:var(--red);background:rgba(255,82,82,.1);color:var(--red)}
.q-dot.skipped{border-color:var(--ylw);background:rgba(255,234,0,.07);color:var(--ylw)}
.q-dot.no-ans{border-color:var(--b2);opacity:.6}

/* ── SCREENS ── */
.screen{display:none;padding:32px;max-width:900px;margin:0 auto}
.screen.active{display:block}

/* HOME */
.home-hero{margin-bottom:32px}
.home-hero h1{font-size:2rem;font-weight:700;margin-bottom:6px}
.home-hero h1 span{color:var(--acc)}
.home-hero p{color:var(--muted);font-size:.9rem}
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;margin-bottom:40px}
.home-card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r2);padding:22px;cursor:pointer;
  transition:var(--trans);position:relative;overflow:hidden;
}
.home-card::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--acc),var(--acc2));
}
.home-card:hover{background:var(--s2);border-color:rgba(79,195,247,.3);transform:translateY(-3px);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.hc-week{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.hc-num{font-family:'Space Mono',monospace;font-size:2.8rem;font-weight:700;color:var(--acc);line-height:1;margin-bottom:4px}
.hc-label{font-size:.8rem;color:var(--muted);margin-bottom:14px}
.hc-tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:.65rem;padding:2px 7px;border-radius:100px;font-family:'Space Mono',monospace}
.tag-blue{background:rgba(79,195,247,.1);color:var(--acc)}
.tag-purple{background:rgba(124,77,255,.1);color:#a78bfa}
.tag-green{background:rgba(0,230,118,.1);color:var(--grn)}
.tag-org{background:rgba(255,145,0,.1);color:var(--org)}
.hc-prev{font-size:.73rem;color:var(--muted);margin-top:12px;font-family:'Space Mono',monospace}

/* ── QUIZ SCREEN ── */
.quiz-topbar{
  display:flex;align-items:center;gap:12px;
  margin-bottom:20px;padding-bottom:18px;
  border-bottom:1px solid var(--b1);
}
.btn-back{
  background:var(--s2);border:1px solid var(--b1);color:var(--muted);
  padding:8px 16px;border-radius:var(--r);cursor:pointer;
  font-size:.82rem;font-family:'Be Vietnam Pro',sans-serif;transition:var(--trans);
}
.btn-back:hover{color:var(--txt);border-color:var(--b3)}
.quiz-title{font-family:'Space Mono',monospace;font-size:.95rem;font-weight:700;color:var(--acc)}
.q-counter{margin-left:auto;font-family:'Space Mono',monospace;font-size:.8rem;color:var(--muted)}

/* Overall progress bar */
.quiz-progress-bar{margin-bottom:24px}
.qpb-track{height:5px;background:var(--b1);border-radius:5px;overflow:hidden;margin-bottom:8px}
.qpb-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:5px;transition:width .4s}
.qpb-labels{display:flex;justify-content:space-between;font-size:.73rem;color:var(--muted);font-family:'Space Mono',monospace}

/* Question card */
.q-card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r2);padding:26px;margin-bottom:18px;
  animation:fadeUp .28s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.qmeta{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.qnum{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--muted)}
.qtype-badge{font-size:.65rem;padding:2px 9px;border-radius:100px;background:rgba(124,77,255,.14);color:#a78bfa;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.5px}
.qtype-badge.calc{background:rgba(255,145,0,.12);color:var(--org)}
.qtype-badge.match{background:rgba(0,229,255,.1);color:var(--acc3)}
.qtype-badge.tf{background:rgba(0,230,118,.1);color:var(--grn)}
.qtype-badge.fill{background:rgba(255,82,82,.1);color:var(--red)}
.no-ans-badge{font-size:.65rem;padding:2px 9px;border-radius:100px;background:rgba(255,234,0,.08);color:var(--ylw);font-family:'Space Mono',monospace}
.qtext{font-size:.97rem;line-height:1.7;white-space:pre-wrap;margin-bottom:22px}

/* Options */
.opts{display:flex;flex-direction:column;gap:9px}
.opt{
  display:flex;align-items:flex-start;gap:12px;
  padding:13px 16px;border-radius:var(--r);border:1.5px solid var(--b1);
  background:var(--s2);cursor:pointer;text-align:left;
  transition:var(--trans);color:var(--txt);font-family:'Be Vietnam Pro',sans-serif;
  font-size:.9rem;line-height:1.5;width:100%;
}
.opt:hover:not(:disabled){border-color:rgba(79,195,247,.4);background:rgba(79,195,247,.04)}
.opt.sel{border-color:var(--acc);background:rgba(79,195,247,.08)}
.opt.correct{border-color:var(--grn)!important;background:rgba(0,230,118,.08)!important;color:var(--grn)!important}
.opt.wrong{border-color:var(--red)!important;background:rgba(255,82,82,.08)!important;color:var(--red)!important}
.opt.show-correct{border-color:rgba(0,230,118,.4);background:rgba(0,230,118,.04)}
.opt:disabled{cursor:default}
.opt-key{
  font-family:'Space Mono',monospace;font-size:.82rem;font-weight:700;
  min-width:28px;height:28px;border-radius:7px;
  background:rgba(255,255,255,.06);display:flex;align-items:center;
  justify-content:center;flex-shrink:0;margin-top:1px;transition:var(--trans);
}
.opt.sel .opt-key{background:var(--acc);color:#000}
.opt.correct .opt-key{background:var(--grn);color:#000}
.opt.wrong .opt-key{background:var(--red);color:#fff}
.opt.show-correct .opt-key{background:rgba(0,230,118,.2);color:var(--grn)}

/* Multi-TF */
.mtf-item{
  display:flex;align-items:center;gap:14px;
  padding:11px 16px;border-radius:var(--r);border:1.5px solid var(--b1);
  background:var(--s2);margin-bottom:8px;font-size:.88rem;
}
.mtf-text{flex:1;line-height:1.45}
.mtf-btns{display:flex;gap:6px;flex-shrink:0}
.tf-btn{
  padding:5px 13px;border-radius:8px;border:1.5px solid var(--b1);
  background:var(--s3);color:var(--muted);cursor:pointer;
  font-size:.78rem;font-weight:600;font-family:'Space Mono',monospace;
  transition:var(--trans);
}
.tf-btn:hover:not(:disabled){border-color:var(--b3);color:var(--txt)}
.tf-btn.sel-t{border-color:var(--grn);background:rgba(0,230,118,.12);color:var(--grn)}
.tf-btn.sel-f{border-color:var(--red);background:rgba(255,82,82,.1);color:var(--red)}
.tf-btn.correct-t{border-color:var(--grn);background:rgba(0,230,118,.15);color:var(--grn)}
.tf-btn.wrong-sel{border-color:var(--red);background:rgba(255,82,82,.1);color:var(--red)}
.tf-btn:disabled{cursor:default;opacity:.7}

/* Simple TF */
.stf-opts{display:flex;gap:10px}
.stf-opt{
  flex:1;padding:16px;border-radius:var(--r);border:1.5px solid var(--b1);
  background:var(--s2);cursor:pointer;text-align:center;font-weight:700;
  font-size:1.1rem;font-family:'Space Mono',monospace;transition:var(--trans);color:var(--muted);
}
.stf-opt:hover:not(:disabled){border-color:var(--b3);color:var(--txt)}
.stf-opt.sel-t{border-color:var(--grn);background:rgba(0,230,118,.1);color:var(--grn)}
.stf-opt.sel-f{border-color:var(--red);background:rgba(255,82,82,.1);color:var(--red)}
.stf-opt.correct{border-color:var(--grn)!important;background:rgba(0,230,118,.12)!important;color:var(--grn)!important}
.stf-opt.wrong{border-color:var(--red)!important;background:rgba(255,82,82,.1)!important;color:var(--red)!important}
.stf-opt:disabled{cursor:default}

/* Matching */
.match-container{display:flex;flex-direction:column;gap:10px}
.match-row{
  display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;
  padding:12px 16px;border-radius:var(--r);border:1.5px solid var(--b1);
  background:var(--s2);
}
.match-item-text{font-size:.88rem;line-height:1.45;color:var(--txt)}
.match-sel{
  background:var(--bg);border:1.5px solid var(--b2);color:var(--txt);
  padding:7px 12px;border-radius:8px;font-family:'Be Vietnam Pro',sans-serif;
  font-size:.85rem;cursor:pointer;min-width:180px;transition:var(--trans);outline:none;
}
.match-sel:focus{border-color:var(--acc)}
.match-sel.sel-correct{border-color:var(--grn);color:var(--grn)}
.match-sel.sel-wrong{border-color:var(--red);color:var(--red)}
.match-sel:disabled{cursor:default}
.choices-bar{
  display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;
  padding:12px 14px;background:var(--s3);border-radius:var(--r);
  border:1px solid var(--b1);
}
.choice-chip{
  padding:5px 12px;border-radius:100px;border:1px solid var(--b2);
  background:var(--s2);font-size:.78rem;color:var(--dim);
  font-family:'Space Mono',monospace;
}

/* Fill-in */
.fill-inputs{display:flex;flex-direction:column;gap:10px}
.fill-row{display:flex;flex-direction:column;gap:5px}
.fill-label{font-size:.78rem;color:var(--muted);font-weight:500}
.fill-input{
  background:var(--s2);border:1.5px solid var(--b1);color:var(--txt);
  padding:10px 14px;border-radius:var(--r);font-size:.9rem;
  font-family:'Be Vietnam Pro',sans-serif;transition:var(--trans);outline:none;
}
.fill-input:focus{border-color:var(--acc);background:var(--s3)}
.fill-input.correct-in{border-color:var(--grn);background:rgba(0,230,118,.06)}
.fill-input.wrong-in{border-color:var(--red);background:rgba(255,82,82,.06)}
.fill-input:disabled{cursor:default}

/* Explanation */
/* Tìm class hiển thị giải thích của bạn, thường là .explanation-box */
.explanation-box {
    white-space: pre-wrap;    /* Giữ nguyên các dấu xuống dòng từ data */
    word-wrap: break-word;    /* Đảm bảo text không bị tràn khung */
    line-height: 1.6;         /* Khoảng cách dòng cho dễ đọc */
    padding: 15px;
    background: var(--s2);
    border-left: 4px solid var(--acc);
    margin-top: 15px;
}
.explanation-box strong{color:#a78bfa}

/* Feedback */
.feedback{
  margin-top:14px;padding:12px 16px;border-radius:var(--r);
  font-size:.86rem;line-height:1.5;animation:fadeUp .2s ease;
}
.feedback.fb-correct{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.3);color:var(--grn)}
.feedback.fb-wrong{background:rgba(255,82,82,.08);border:1px solid rgba(255,82,82,.3);color:var(--red)}
.feedback.fb-skip{background:rgba(255,234,0,.06);border:1px solid rgba(255,234,0,.25);color:var(--ylw)}
.feedback.fb-info{background:rgba(79,195,247,.06);border:1px solid rgba(79,195,247,.2);color:var(--acc)}
.feedback.fb-partial{background:rgba(255,145,0,.08);border:1px solid rgba(255,145,0,.3);color:var(--org)}

/* Actions */
.q-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.btn{
  padding:10px 22px;border-radius:var(--r);font-family:'Be Vietnam Pro',sans-serif;
  font-size:.87rem;font-weight:600;cursor:pointer;transition:var(--trans);border:1.5px solid transparent;
}
.btn-primary{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#000;font-weight:700}
.btn-primary:hover{opacity:.88;transform:translateY(-1px)}
.btn-outline{background:transparent;border-color:rgba(79,195,247,.35);color:var(--acc)}
.btn-outline:hover{background:rgba(79,195,247,.08)}
.btn-ghost{background:var(--s2);border-color:var(--b1);color:var(--muted)}
.btn-ghost:hover{color:var(--txt);border-color:var(--b3)}
.btn-danger{background:transparent;border-color:rgba(255,82,82,.3);color:var(--red)}
.btn-danger:hover{background:rgba(255,82,82,.08)}
.btn:disabled{opacity:.35;cursor:default;transform:none!important}

/* ── RESULT SCREEN ── */
.result-wrap{max-width:640px;margin:0 auto}
.result-card{
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--r3);
  padding:40px;text-align:center;margin-bottom:24px;position:relative;overflow:hidden;
}
.result-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--acc),var(--acc2),var(--grn));
}
.result-ring{width:150px;height:150px;margin:0 auto 22px;position:relative}
.result-ring svg{transform:rotate(-90deg)}
.ring-text{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
}
.ring-pct{font-family:'Space Mono',monospace;font-size:2rem;font-weight:700}
.ring-label{font-size:.7rem;color:var(--muted)}
.result-title{font-family:'Space Mono',monospace;font-size:1.5rem;font-weight:700;margin-bottom:6px}
.result-sub{font-size:.85rem;color:var(--muted);margin-bottom:28px}
.result-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.rs-stat{background:var(--s2);border-radius:var(--r);padding:16px;text-align:center}
.rs-num{font-family:'Space Mono',monospace;font-size:1.5rem;font-weight:700;margin-bottom:3px}
.rs-lbl{font-size:.72rem;color:var(--muted)}
.result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ── STATS SCREEN ── */
.stats-wrap h1{font-family:'Space Mono',monospace;font-size:1.4rem;margin-bottom:6px}
.stats-wrap p{color:var(--muted);font-size:.85rem;margin-bottom:28px}
.stats-top{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;margin-bottom:32px}
.sc{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:18px}
.sc h4{font-family:'Space Mono',monospace;font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px}
.sc .sn{font-family:'Space Mono',monospace;font-size:1.8rem;font-weight:700;color:var(--acc);margin-bottom:3px}
.sc .sl{font-size:.75rem;color:var(--muted)}
.hist-table{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);overflow:hidden;margin-bottom:24px}
.hist-table h3{font-family:'Space Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);padding:14px 18px;border-bottom:1px solid var(--b1)}
.hist-row{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--b1);font-size:.83rem;transition:background .15s}
.hist-row:last-child{border-bottom:none}
.hist-row:hover{background:var(--s2)}
.hr-week{font-family:'Space Mono',monospace;font-size:.75rem;color:var(--acc);min-width:90px}
.hr-score{font-family:'Space Mono',monospace;font-weight:700;min-width:50px}
.hr-bar{flex:1}
.hr-date{color:var(--muted);font-size:.73rem;min-width:85px;text-align:right}
.mini-bar{height:5px;background:var(--b1);border-radius:5px;overflow:hidden}
.mini-bar-fill{height:100%;border-radius:5px}
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state .ei{font-size:3rem;margin-bottom:14px}
.empty-state h3{font-size:1rem;color:var(--txt);margin-bottom:6px}

/* Scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:var(--b3)}

/* Mobile */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%)}
  .sidebar.mobile-visible{transform:translateX(0)}
  .main-wrap{margin-left:0!important}
  .progress-panel{right:-100%!important;width:100%}
  .progress-panel.visible{right:0!important}
  .main-wrap.quiz-open{margin-right:0}
  .result-grid{grid-template-columns:1fr 1fr}
  .screen{padding:20px}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <button class="sidebar-toggle" id="sidebar-toggle" title="Ẩn/Hiện menu" onclick="toggleSidebar()">☰</button>
  <div class="hdr-logo">NET<span>QUIZ</span></div>
  <span class="hdr-pill">Mạng Máy Tính</span>
  <div class="hdr-timer" id="hdr-timer" onclick="toggleTimer()" title="Nhấn để tạm dừng/tiếp tục">
    <span class="timer-icon">⏱</span>
    <span id="timer-display">00:00</span>
  </div>
</header>

<!-- LAYOUT -->
<div class="layout">
  <!-- LEFT SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-section">
      <div class="sb-label">Bài kiểm tra</div>
      <div id="week-nav"></div>
    </div>
    <hr class="sb-divider">
    <div class="sb-section" style="padding-top:4px">
      <button class="nav-extra-btn" id="stats-btn" onclick="showScreen('stats')">
        📊 Thống kê học tập
      </button>
    </div>
    <hr class="sb-divider">
    <div class="sb-stats">
      <div class="sb-label">Tổng quan</div>
      <div id="global-sidebar-stats"></div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-wrap" id="main-wrap">

    <!-- HOME SCREEN -->
    <div class="screen active" id="screen-home">
      <div class="home-hero">
        <h1>Chọn <span>bài kiểm tra</span></h1>
        <p>Trắc nghiệm Mạng Máy Tính · 176 câu hỏi · 4 chủ đề · 5 dạng câu hỏi</p>
      </div>
      <div class="home-grid" id="home-grid"></div>
    </div>

    <!-- QUIZ SCREEN -->
    <div class="screen" id="screen-quiz">
      <div class="quiz-topbar">
        <button class="btn-back" onclick="confirmBack()">← Quay lại</button>
        <span class="quiz-title" id="quiz-label">Tuần 4</span>
        <span class="q-counter" id="q-counter">1 / 17</span>
      </div>
      <div class="quiz-progress-bar">
        <div class="qpb-track"><div class="qpb-fill" id="qpb-fill" style="width:0%"></div></div>
        <div class="qpb-labels">
          <span id="qpb-left">0 đã trả lời</span>
          <span id="qpb-right">0 đúng</span>
        </div>
      </div>
      <div id="quiz-container"></div>
      <div class="q-actions" id="q-actions"></div>
    </div>

    <!-- RESULT SCREEN -->
    <div class="screen" id="screen-result">
      <div class="result-wrap">
        <div class="result-card" id="result-card"></div>
        <div class="result-actions">
          <button class="btn btn-primary" onclick="retryQuiz()">🔁 Làm lại</button>
          <button class="btn btn-outline" onclick="showScreen('home')">🏠 Trang chủ</button>
          <button class="btn btn-ghost" onclick="showScreen('stats')">📊 Thống kê</button>
        </div>
      </div>
    </div>

    <!-- STATS SCREEN -->
    <div class="screen" id="screen-stats">
      <div class="stats-wrap">
        <h1>📊 Thống kê</h1>
        <p>Lịch sử thi và tiến độ học tập của bạn</p>
        <div id="stats-content"></div>
      </div>
    </div>

  </div><!-- /main-wrap -->

  <!-- RIGHT PROGRESS PANEL -->
  <div class="progress-panel" id="progress-panel">
    <div class="pp-header">
      <h4>Câu hỏi</h4>
      <button class="pp-close" onclick="toggleProgressPanel()">✕</button>
    </div>
    <div class="pp-stats" id="pp-stats"></div>
    <input type="text" class="pp-search" id="pp-search" placeholder="Tìm câu số..." oninput="filterDots(this.value)">
    <div class="q-grid" id="q-grid"></div>
  </div>
</div>

<!-- const DATA = {"weeks":{"4":[{"id":1,"week":4,"type":"matching","question":"Hãy xem xét một kịch bản trong đó 5 người dùng đang được ghép kênh trên một kênh có tốc độ 10 Mbps. Trong các kịch bản khác nhau bên dưới, hãy chọn kịch bản phù hợp với việc circuit switching hay packet switching tốt hơn.","matches":[{"item":"Mỗi người dùng tạo ra lưu lượng ở tốc độ trung bình 0,21 Mbps, tạo ra lưu lượng ở tốc độ 15 Mbps khi truyền","answer_key":"C","answer_label":"Packet switching"},{"item":"Mỗi người dùng tạo ra lưu lượng ở tốc độ trung bình 2,1 Mbps, tạo ra lưu lượng ở tốc độ 15 Mbps khi truyền","answer_key":"B","answer_label":"Cả hai đều không hoạt động tốt"},{"item":"Mỗi người dùng tạo ra lưu lượng ở tốc độ trung bình 2 Mbps, tạo ra lưu lượng ở tốc độ 2 Mbps khi truyền","answer_key":"A","answer_label":"Circuit switching"}],"choices":[{"key":"A","label":"Circuit switching"},{"key":"B","label":"Cả hai đều không hoạt động tốt"},{"key":"C","label":"Packet switching"}]},{"id":2,"week":4,"type":"matching","question":"So khớp mô tả của từng thành phần packet delay với tên của nó.","matches":[{"item":"Thời gian dành cho việc truyền các bit gói vào liên kết.","answer_key":"B","answer_label":"Transmission delay"},{"item":"Cần thời gian để các bit truyền vật lý qua môi trường truyền từ đầu này đến đầu kia của liên kết.","answer_key":"D","answer_label":"Propagation delay"},{"item":"Thời gian cần thiết để thực hiện kiểm tra tính toàn vẹn, tra cứu thông tin gói trong bảng cục bộ và di chuyển gói từ liên kết đầu vào đến liên kết đầu ra trong bộ định tuyến.","answer_key":"A","answer_label":"Processing delay"},{"item":"Thời gian chờ đợi trong bộ đệm gói để truyền liên kết.","answer_key":"C","answer_label":"Queueing delay"}],"choices":[{"key":"A","label":"Processing delay"},{"key":"B","label":"Transmission delay"},{"key":"C","label":"Queueing delay"},{"key":"D","label":"Propagation delay"}]},{"id":3,"week":4,"type":"matching","question":"Khớp tên của lớp Internet với đơn vị dữ liệu được trao đổi giữa các thực thể giao thức ở lớp đó.","matches":[{"item":"Link layer","answer_key":"D","answer_label":"Frame"},{"item":"Transport layer","answer_key":"E","answer_label":"Segment"},{"item":"Network layer","answer_key":"C","answer_label":"Datagram"},{"item":"Application layer","answer_key":"B","answer_label":"Message"},{"item":"Physical layer","answer_key":"A","answer_label":"Bit"}],"choices":[{"key":"A","label":"Bit"},{"key":"B","label":"Message"},{"key":"C","label":"Datagram"},{"key":"D","label":"Frame"},{"key":"E","label":"Segment"}]},{"id":4,"week":4,"type":"matching","question":"Hãy xem hình bên dưới, hiển thị tiêu đề khung lớp liên kết từ máy chủ đến bộ định tuyến. Có ba trường tiêu đề được hiển thị. Hãy ghép tên của tiêu đề với nhãn tiêu đề hiển thị trong hình.","matches":[{"item":"Header H2","answer_key":"E","answer_label":"Network Layer"},{"item":"Header H1","answer_key":"C","answer_label":"Link layer"},{"item":"Header H3","answer_key":"A","answer_label":"Application layer"}],"choices":[{"key":"A","label":"Application layer"},{"key":"C","label":"Link layer"},{"key":"E","label":"Network Layer"}]},{"id":5,"week":4,"type":"mcq","question":"Mô tả nào dưới đây tương ứng với quan điểm 'cốt lõi' về Internet?","options":[{"key":"A","text":"Một tập hợp hàng tỷ thiết bị máy tính và các chuyển mạch gói được kết nối với nhau bằng các liên kết."},{"key":"B","text":"Nơi tôi đến để tìm kiếm thông tin, giải trí và giao tiếp với mọi người."},{"key":"C","text":"Một tập hợp các thành phần chính của mạng và phần mềm thực thi các giao thức..."},{"key":"D","text":"Một 'mạng của các mạng'."},{"key":"E","text":"Một nền tảng để xây dựng các ứng dụng mạng."}],"answer":["A","D"],"multi":true,"explanation":"","subtype":"mcq"},{"id":6,"week":4,"type":"mcq","question":"Khi nói rằng Internet là một 'mạng của các mạng', ý là gì?","options":[{"key":"A","text":"Internet là mạng nhanh nhất từng được xây dựng."},{"key":"B","text":"Internet được tạo thành từ các mạng truy cập ở biên, mạng cấp 1 ở lõi cũng như các mạng nhà cung cấp nội dung và khu vực được kết nối với nhau."},{"key":"C","text":"Internet là mạng lớn nhất từng được xây dựng."},{"key":"D","text":"Internet được tạo thành từ rất nhiều mạng khác nhau được kết nối với nhau."}],"answer":["B","D"],"multi":true,"explanation":"","subtype":"mcq"},{"id":7,"week":4,"type":"mcq","question":"Giả sử một gói dài L = 1500 byte (một byte = 8 bit) và liên kết truyền ở tốc độ R = 1 Gbps (tức là một liên kết có thể truyền bit 1.000.000.000 bit mỗi giây). Độ trễ truyền của gói này là bao nhiêu?","options":[{"key":"A","text":".0015 secs"},{"key":"B","text":".00012 secs"},{"key":"C","text":".0000015 secs"},{"key":"D","text":"666,666 secs"},{"key":"E","text":".000012 secs"}],"answer":["E"],"multi":false,"explanation":"1500*8 = 12000 bit; 12000 / 1e9 = 1.2e-5 = 0.000012 secs","subtype":"calculation"},{"id":8,"week":4,"type":"mcq","question":"Giả sử một gói có độ dài L = 1200 byte (một byte = 8 bit) và liên kết truyền ở tốc độ R = 100 Mbps. Độ trễ truyền của gói này là bao nhiêu?","options":[{"key":"A","text":".000096 secs"},{"key":"B","text":".00096 secs"},{"key":"C","text":".000015 secs"},{"key":"D","text":".0012 secs"},{"key":"E","text":"8,333 secs"}],"answer":["A"],"multi":false,"explanation":"1200*8 = 9600 bit; 9600 / 100e6 = 9.6e-5 = 0.000096 secs","subtype":"calculation"},{"id":9,"week":4,"type":"mcq","question":"Xem xét mạng được hiển thị trong hình bên dưới, với ba liên kết, mỗi liên kết có tốc độ truyền và độ dài liên kết được chỉ định. Giả sử độ dài của gói là 8000 bit. Độ trễ truyền ở liên kết 2 là bao nhiêu?","options":[{"key":"A","text":"12.5 secs"},{"key":"B","text":"12,500 secs"},{"key":"C","text":".00096 secs"},{"key":"D","text":"100 secs"},{"key":"E","text":"8 x 10^(-5) secs"}],"answer":["C"],"multi":false,"explanation":"","subtype":"calculation"},{"id":10,"week":4,"type":"mcq","question":"Hãy xem xét mạng hiển thị trong hình bên dưới, với ba liên kết, mỗi liên kết có tốc độ truyền và độ const SAVED_DATA = localStorage.getItem('NETQUIZ_DATA');
if (SAVED_DATA) {
    try {
        DATA = JSON.parse(SAVED_DATA);
    } catch(e) { console.error("Lỗi parse data:", e); }
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let ST = {
  week: null,
  questions: [],
  idx: 0,
  answers: {},      // qid → {userAnswer, correct, skipped}
  tempSel: {},      // For MCQ/multi selections before submitting
  sidebarHidden: false,
  progressVisible: false,
  timer: { elapsed: 0, running: false, interval: null, paused: false },
  attempts: JSON.parse(localStorage.getItem('nq_v2_attempts') || '[]'),
  weekProg: JSON.parse(localStorage.getItem('nq_v2_prog') || '{}'),
};

// ═══════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════
function startTimer() {
  stopTimer();
  ST.timer.elapsed = 0;
  ST.timer.running = true;
  ST.timer.paused = false;
  ST.timer.interval = setInterval(() => {
    if (!ST.timer.paused) {
      ST.timer.elapsed++;
      updateTimerDisplay();
    }
  }, 1000);
}
function stopTimer() {
  if (ST.timer.interval) clearInterval(ST.timer.interval);
  ST.timer.running = false;
}
function toggleTimer() {
  if (!ST.timer.running) return;
  ST.timer.paused = !ST.timer.paused;
  const el = document.getElementById('hdr-timer');
  el.title = ST.timer.paused ? 'Nhấn để tiếp tục' : 'Nhấn để tạm dừng';
}
function updateTimerDisplay() {
  const s = ST.timer.elapsed;
  const m = Math.floor(s / 60), sec = s % 60;
  const txt = `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  document.getElementById('timer-display').textContent = txt;
  const el = document.getElementById('hdr-timer');
  el.className = 'hdr-timer' + (s >= 3600 ? ' danger' : s >= 1800 ? ' warning' : '');
}

// ═══════════════════════════════════════════════
// SIDEBAR
// ═══════════════════════════════════════════════
function toggleSidebar() {
  ST.sidebarHidden = !ST.sidebarHidden;
  document.getElementById('sidebar').classList.toggle('hidden', ST.sidebarHidden);
  document.getElementById('main-wrap').classList.toggle('sidebar-hidden', ST.sidebarHidden);
  document.getElementById('sidebar-toggle').textContent = ST.sidebarHidden ? '▶' : '☰';
}

// ═══════════════════════════════════════════════
// PROGRESS PANEL
// ═══════════════════════════════════════════════
function toggleProgressPanel() {
  ST.progressVisible = !ST.progressVisible;
  document.getElementById('progress-panel').classList.toggle('visible', ST.progressVisible);
  document.getElementById('main-wrap').classList.toggle('quiz-open', ST.progressVisible);
}
function openProgressPanel() {
  ST.progressVisible = true;
  document.getElementById('progress-panel').classList.add('visible');
  document.getElementById('main-wrap').classList.add('quiz-open');
}

function renderProgressPanel() {
  const qs = ST.questions;
  const total = qs.length;
  const answered = Object.keys(ST.answers).length;
  const correct = Object.values(ST.answers).filter(a => a.correct === true).length;
  const wrong = Object.values(ST.answers).filter(a => a.correct === false).length;

  document.getElementById('pp-stats').innerHTML = `
    <div class="pp-stat"><div class="psn" style="color:var(--acc)">${answered}</div><div class="psl">Đã làm</div></div>
    <div class="pp-stat"><div class="psn" style="color:var(--grn)">${correct}</div><div class="psl">Đúng</div></div>
    <div class="pp-stat"><div class="psn" style="color:var(--red)">${wrong}</div><div class="psl">Sai</div></div>
  `;

  renderDots('');
}

function renderDots(filter) {
  const grid = document.getElementById('q-grid');
  const qs = ST.questions;
  grid.innerHTML = '';
  qs.forEach((q, i) => {
    if (filter && !String(i+1).includes(filter)) return;
    const ans = ST.answers[q.id];
    let cls = 'q-dot';
    if (i === ST.idx) cls += ' current';
    else if (ans) {
      if (ans.skipped) cls += ' skipped';
      else if (ans.correct === true) cls += ' correct';
      else if (ans.correct === false) cls += ' wrong';
      else if (ans.correct === null) cls += ' answered'; // no answer available
      else cls += ' answered';
    }
    if (!q.answer && !q.answers && !q.matches) cls += ' no-ans';

    const dot = document.createElement('div');
    dot.className = cls;
    dot.textContent = i + 1;
    dot.title = `Câu ${i+1}: ${q.question.substring(0,50)}...`;
    dot.onclick = () => jumpTo(i);
    grid.appendChild(dot);
  });
}

function filterDots(val) { renderDots(val.trim()); }

function jumpTo(idx) {
  ST.idx = idx;
  ST.tempSel = {};
  renderQuestion();
  renderProgressPanel();
  // Scroll to top
  document.querySelector('.screen.active').scrollIntoView({behavior:'smooth', block:'start'});
}

// ═══════════════════════════════════════════════
// SCREEN MANAGEMENT
// ═══════════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');

  // Update nav state
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('stats-btn').classList.toggle('active', name === 'stats');

  if (name === 'stats') renderStats();
  if (name !== 'quiz') {
    // Hide progress panel when not in quiz
    ST.progressVisible = false;
    document.getElementById('progress-panel').classList.remove('visible');
    document.getElementById('main-wrap').classList.remove('quiz-open');
    stopTimer();
  }
}

// ═══════════════════════════════════════════════
// INIT & HOME
// ═══════════════════════════════════════════════
function init() {
  renderWeekNav();
  renderHomeGrid();
  renderGlobalSidebar();
  updateTimerDisplay();
}

const WEEK_ICONS = { '1':'📚', '4':'🌐', '5':'📡', '8':'🔗' };
const TYPE_LABELS = {
  mcq: 'MCQ', matching: 'Ghép đôi', true_false: 'Đúng/Sai',
  fill_in: 'Điền vào', calculation: 'Tính toán'
};
const TYPE_TAG_CLS = {
  mcq:'tag-blue', matching:'tag-purple', true_false:'tag-green',
  fill_in:'tag-org', calculation:'tag-org'
};

function getWeekLabel(w) {
  return DATA.week_info[w]?.label || 'Tuần ' + w;
}
function getWeekProg(w) {
  return ST.weekProg[w] || { done:0, total:0, correct:0, attempts:0, bestPct:0 };
}

function renderWeekNav() {
  const nav = document.getElementById('week-nav');
  nav.innerHTML = '';
  Object.keys(DATA.weeks).sort().forEach(w => {
    const qs = DATA.weeks[w];
    const prog = getWeekProg(w);
    const pct = prog.total > 0 ? Math.round(prog.done / prog.total * 100) : 0;
    const btn = document.createElement('button');
    btn.className = 'week-btn' + (ST.week === w ? ' active' : '');
    btn.id = 'nav-w-' + w;
    btn.innerHTML = `
      <span class="wb-icon">${WEEK_ICONS[w]||'📋'}</span>
      <div class="wb-info">
        <span class="wb-title">${getWeekLabel(w)}</span>
        <span class="wb-sub">${qs.length} câu · ${DATA.week_info[w]?.desc||''}</span>
        <div class="sb-prog"><div class="sb-prog-fill" style="width:${pct}%"></div></div>
      </div>
      <span class="wb-count">${qs.length}</span>
    `;
    btn.onclick = () => startQuiz(w);
    nav.appendChild(btn);
  });
}

function renderHomeGrid() {
  const grid = document.getElementById('home-grid');
  grid.innerHTML = '';
  Object.keys(DATA.weeks).sort().forEach(w => {
    const qs = DATA.weeks[w];
    const prog = getWeekProg(w);
    const types = {};
    qs.forEach(q => { types[q.type] = (types[q.type]||0)+1; });

    const card = document.createElement('div');
    card.className = 'home-card';
    card.onclick = () => startQuiz(w);
    const tagsHTML = Object.entries(types).slice(0,3).map(([t,c]) =>
      `<span class="tag ${TYPE_TAG_CLS[t]||'tag-blue'}">${TYPE_LABELS[t]||t}: ${c}</span>`
    ).join('');
    const prevStr = prog.attempts > 0 ? `${prog.attempts} lần làm · cao nhất ${prog.bestPct}%` : 'Chưa làm';

    card.innerHTML = `
      <div class="hc-week">${WEEK_ICONS[w]||'📋'} ${getWeekLabel(w).toUpperCase()}</div>
      <div class="hc-num">${qs.length}</div>
      <div class="hc-label">câu hỏi</div>
      <div class="hc-tags">${tagsHTML}</div>
      <div class="hc-prev">${prevStr}</div>
    `;
    grid.appendChild(card);
  });
}

function renderGlobalSidebar() {
  const el = document.getElementById('global-sidebar-stats');
  const total = Object.values(DATA.weeks).reduce((s,w) => s+w.length, 0);
  const totalA = ST.attempts.length;
  const allC = ST.attempts.reduce((s,a) => s+(a.correct||0), 0);
  const allAns = ST.attempts.reduce((s,a) => s+(a.graded||0), 0);
  const avg = allAns > 0 ? Math.round(allC/allAns*100) : 0;
  el.innerHTML = `
    <div class="sb-stat-row"><span class="lbl">Tổng câu</span><span class="val" style="color:var(--acc)">${total}</span></div>
    <div class="sb-stat-row"><span class="lbl">Số lần thi</span><span class="val">${totalA}</span></div>
    <div class="sb-stat-row"><span class="lbl">Tỉ lệ đúng TB</span><span class="val" style="color:${avg>=70?'var(--grn)':'var(--acc)'}">${allAns>0?avg+'%':'--'}</span></div>
  `;
}

// ═══════════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════════
function startQuiz(w) {
  ST.week = w;
  ST.questions = [...DATA.weeks[w]];
  ST.idx = 0;
  ST.answers = {};
  ST.tempSel = {};

  // Update nav
  document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
  const nb = document.getElementById('nav-w-' + w);
  if (nb) nb.classList.add('active');
  document.getElementById('stats-btn').classList.remove('active');
  document.getElementById('quiz-label').textContent = getWeekLabel(w);

  showScreen('quiz');
  startTimer();
  openProgressPanel();
  renderProgressPanel();
  renderQuestion();
}

function confirmBack() {
  if (Object.keys(ST.answers).length > 0) {
    if (!confirm('Bỏ bài thi? Tiến độ sẽ không được lưu.')) return;
  }
  stopTimer();
  showScreen('home');
  ST.week = null;
  renderWeekNav();
  renderHomeGrid();
}

function escH(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderQuestion() {
  const q = ST.questions[ST.idx];
  const total = ST.questions.length;
  const answered = Object.keys(ST.answers).length;
  const correct = Object.values(ST.answers).filter(a => a.correct === true).length;

  document.getElementById('q-counter').textContent = `${ST.idx+1} / ${total}`;
  document.getElementById('qpb-fill').style.width = (answered/total*100) + '%';
  document.getElementById('qpb-left').textContent = `${answered} đã trả lời`;
  document.getElementById('qpb-right').textContent = `${correct} đúng`;

  const prev = ST.answers[q.id];
  const container = document.getElementById('quiz-container');

  // Xử lý Badge loại câu hỏi
  const subtype = q.subtype || q.type;
  let typeCls = '';
  let typeLabel = TYPE_LABELS[q.type] || q.type;
  if (subtype === 'calculation') { typeCls = 'calc'; typeLabel = 'Tính toán'; }
  else if (q.type === 'matching') typeCls = 'match';
  else if (q.type === 'true_false') typeCls = 'tf';
  else if (q.type === 'fill_in') typeCls = 'fill';
  if (q.multi) typeLabel += ' (nhiều đáp án)';

  const hasAnswer = hasKnownAnswer(q);
  
  // BẮT ĐẦU CHỈNH SỬA: Hợp nhất logic hiển thị ảnh vào qHTML
  let qHTML = `<div class="q-card">
    <div class="qmeta">
      <span class="qnum">Câu ${ST.idx+1}/${total}</span>
      <span class="qtype-badge ${typeCls}">${typeLabel}</span>
      ${!hasAnswer ? '<span class="no-ans-badge">⚠ Tự đánh giá</span>' : ''}
    </div>
    
    ${q.image ? `
      <div class="q-image" style="margin: 0 auto 20px; text-align:center; max-width: 100%;">
        <img src="${q.image}" style="max-width:100%; height:auto; border-radius:12px; border:1px solid var(--b1); display:block; margin:0 auto;" alt="Question illustration">
      </div>
    ` : ''}

    <div class="qtext">${escH(q.question)}</div>
  `;

  // Render nội dung đáp án theo type (giữ nguyên logic gốc)
  if (q.type === 'mcq' || q.type === 'multiple_choice' || q.type === 'calculation') {
    qHTML += renderMCQ(q, prev);
  } else if (q.type === 'true_false') {
    if (q.subtype === 'multi_tf') qHTML += renderMultiTF(q, prev);
    else qHTML += renderSimpleTF(q, prev);
  } else if (q.type === 'matching') {
    qHTML += renderMatching(q, prev);
  } else if (q.type === 'fill_in') {
    qHTML += renderFillIn(q, prev);
  }

  // Phản hồi (Feedback) & Giải thích (Explanation)
  if (prev) {
    if (prev.skipped) {
      qHTML += `<div class="feedback fb-skip">⏭️ Bạn đã bỏ qua câu này.</div>`;
    } else if (!hasAnswer) {
      qHTML += `<div class="feedback fb-info">📝 Câu hỏi dạng tự luận – hãy tự đánh giá kết quả của bạn.</div>`;
    } else if (prev.correct === true) {
      qHTML += `<div class="feedback fb-correct">✅ Chính xác!</div>`;
    } else if (prev.correct === 'partial') {
      qHTML += `<div class="feedback fb-partial">⚡ Đúng một phần – hãy xem lại các đáp án.</div>`;
    } else {
      qHTML += `<div class="feedback fb-wrong">❌ Chưa đúng.</div>`;
    }
    
    if (q.explanation) {
      qHTML += `<div class="explanation-box"><strong>💡 Giải thích:</strong> ${escH(q.explanation)}</div>`;
    }
  }

  qHTML += '</div>';
  container.innerHTML = qHTML;

  if (!prev) restoreTempSel(q);
  renderActions(prev, q);
  renderProgressPanel();
}

function hasKnownAnswer(q) {
  if (q.type === 'fill_in') return false; // free text, always self-evaluate
  if (q.type === 'true_false') {
    if (q.subtype === 'multi_tf') return !!q.answer && Object.keys(q.answer).length > 0;
    return !!q.answer;
  }
  if (q.type === 'mcq') return q.answer && q.answer.length > 0;
  if (q.type === 'matching') return q.matches && q.matches.length > 0;
  return true;
}

function renderActions(prev, q) {
  const actions = document.getElementById('q-actions');
  const isLast = ST.idx === ST.questions.length - 1;
  if (prev) {
    actions.innerHTML = `
      ${ST.idx > 0 ? '<button class="btn btn-ghost" onclick="prevQuestion()">← Câu trước</button>' : ''}
      <button class="btn btn-primary" onclick="${isLast ? 'finishQuiz()' : 'nextQuestion()'}">${isLast ? '🏁 Kết thúc' : 'Câu tiếp →'}</button>
      <button class="btn btn-ghost" style="margin-left:auto" onclick="finishQuiz()">Nộp bài</button>
    `;
  } else {
    actions.innerHTML = `
      ${ST.idx > 0 ? '<button class="btn btn-ghost" onclick="prevQuestion()">← Câu trước</button>' : ''}
      <button class="btn btn-primary" onclick="checkAnswer()">Kiểm tra</button>
      <button class="btn btn-outline" onclick="skipQuestion()">Bỏ qua →</button>
      <button class="btn btn-ghost" style="margin-left:auto" onclick="finishQuiz()">Nộp bài</button>
    `;
  }
}

// ── MCQ RENDER ──
function renderMCQ(q, prev) {
  let html = '<div class="opts">';
  const ua = prev?.userAnswer || [];
  q.options.forEach(opt => {
    let cls = 'opt';
    const isSel = ua.includes(opt.key);
    const isCorrect = q.answer && q.answer.includes(opt.key);
    if (prev) {
      if (isSel && prev.correct === true) cls += ' correct';
      else if (isSel && prev.correct !== true) cls += ' wrong';
      else if (isCorrect && !isSel) cls += ' show-correct';
    } else {
      if (ST.tempSel[q.id]?.includes(opt.key)) cls += ' sel';
    }
    html += `<button class="${cls}" onclick="selectOpt('${escH(opt.key)}')" ${prev?'disabled':''}>
      <div class="opt-key">${escH(opt.key)}</div>
      <div>${escH(opt.text)}</div>
    </button>`;
  });
  return html + '</div>';
}

function selectOpt(key) {
  const q = ST.questions[ST.idx];
  if (!ST.tempSel[q.id]) ST.tempSel[q.id] = [];
  if (q.multi) {
    const idx = ST.tempSel[q.id].indexOf(key);
    if (idx >= 0) ST.tempSel[q.id].splice(idx, 1);
    else ST.tempSel[q.id].push(key);
  } else {
    ST.tempSel[q.id] = [key];
  }
  // Re-render options only
  const container = document.getElementById('quiz-container');
  const optsEl = container.querySelector('.opts');
  if (optsEl) {
    const tmp = document.createElement('div');
    tmp.innerHTML = renderMCQ(q, null);
    optsEl.replaceWith(tmp.firstChild);
  }
}

// ── MULTI TF RENDER ──
function renderMultiTF(q, prev) {
  let html = '<div class="match-container" style="gap:8px">';
  const items = q.items || [];
  items.forEach((item, i) => {
    const key = item.key;
    const ua = prev?.userAnswer?.[key];
    const correct = q.answer?.[key];
    const tempSel = ST.tempSel[q.id]?.[key];
    const display = ua || tempSel;

    let btnT = 'tf-btn', btnF = 'tf-btn';
    if (prev && ua) {
      if (ua === 'Đúng') {
        btnT += ua === correct ? ' correct-t' : ' wrong-sel';
      } else {
        btnF += ua === correct ? ' correct-t' : ' wrong-sel';
      }
      // Show correct if wrong
      if (ua !== correct) {
        if (correct === 'Đúng') btnT += ' correct-t';
        else btnF += ' correct-t';
      }
    } else {
      if (tempSel === 'Đúng') btnT += ' sel-t';
      if (tempSel === 'Sai') btnF += ' sel-f';
    }

    html += `<div class="mtf-item">
      <div class="mtf-text">${escH(item.text)}</div>
      <div class="mtf-btns">
        <button class="${btnT}" onclick="selectMTF('${key}','Đúng')" ${prev?'disabled':''}>${prev && ua === 'Đúng' && ua !== correct ? '✗' : ''} Đúng</button>
        <button class="${btnF}" onclick="selectMTF('${key}','Sai')" ${prev?'disabled':''}>${prev && ua === 'Sai' && ua !== correct ? '✗' : ''} Sai</button>
      </div>
    </div>`;
  });
  return html + '</div>';
}

function selectMTF(key, val) {
  const q = ST.questions[ST.idx];
  if (!ST.tempSel[q.id]) ST.tempSel[q.id] = {};
  ST.tempSel[q.id][key] = val;
  // Re-render
  const card = document.getElementById('quiz-container').querySelector('.match-container');
  if (card) {
    const tmp = document.createElement('div');
    tmp.innerHTML = renderMultiTF(q, null);
    card.replaceWith(tmp.firstChild);
  }
}

// ── SIMPLE TF RENDER ──
function renderSimpleTF(q, prev) {
  const ua = prev?.userAnswer;
  const correct = q.answer;
  let clsT = 'stf-opt', clsF = 'stf-opt';
  if (prev && ua) {
    if (ua === 'Đúng') clsT += ua === correct ? ' correct' : ' wrong';
    if (ua === 'Sai') clsF += ua === correct ? ' correct' : ' wrong';
    if (ua !== correct) {
      if (correct === 'Đúng') clsT += ' correct';
      else clsF += ' correct';
    }
  } else {
    const ts = ST.tempSel[q.id];
    if (ts === 'Đúng') clsT += ' sel-t';
    if (ts === 'Sai') clsF += ' sel-f';
  }
  return `<div class="stf-opts">
    <button class="${clsT}" onclick="selectSTF('Đúng')" ${prev?'disabled':''}>✓ ĐÚNG</button>
    <button class="${clsF}" onclick="selectSTF('Sai')" ${prev?'disabled':''}>✗ SAI</button>
  </div>`;
}

function selectSTF(val) {
  const q = ST.questions[ST.idx];
  ST.tempSel[q.id] = val;
  // Re-render simple tf
  const opts = document.getElementById('quiz-container').querySelector('.stf-opts');
  if (opts) {
    const tmp = document.createElement('div');
    tmp.innerHTML = renderSimpleTF(q, null);
    opts.replaceWith(tmp.firstChild);
  }
}

// ── MATCHING RENDER ──
function renderMatching(q, prev) {
  const choices = q.choices || [];
  // Choices bar
  let html = `<div class="choices-bar">
    ${choices.map(c => `<span class="choice-chip">${escH(c.key)}. ${escH(c.label)}</span>`).join('')}
  </div>
  <div class="match-container">`;

  q.matches.forEach((m, i) => {
    const ua = prev?.userAnswer?.[i];
    const correct = m.answer_key;
    let selCls = 'match-sel';
    if (prev && ua) {
      selCls += ua === correct ? ' sel-correct' : ' sel-wrong';
    }
    const tempVal = ST.tempSel[q.id]?.[i] || '';
    const val = prev ? (ua || '') : tempVal;

    html += `<div class="match-row">
      <div class="match-item-text">${escH(m.item)}</div>
      <select class="${selCls}" id="ms-${i}" onchange="selectMatch(${i},this.value)" ${prev?'disabled':''}>
        <option value="">-- Chọn --</option>
        ${choices.map(c => `<option value="${c.key}" ${val===c.key?'selected':''}>${c.key}. ${escH(c.label)}</option>`).join('')}
      </select>
    </div>`;
    // Show correct answer label if wrong
    if (prev && ua && ua !== correct) {
      html += `<div style="font-size:.75rem;color:var(--grn);padding:2px 16px 8px">✓ Đáp án: ${correct}. ${escH(m.answer_label)}</div>`;
    }
  });
  return html + '</div>';
}

function selectMatch(idx, val) {
  const q = ST.questions[ST.idx];
  if (!ST.tempSel[q.id]) ST.tempSel[q.id] = {};
  ST.tempSel[q.id][idx] = val;
}

// ── FILL IN RENDER ──
function renderFillIn(q, prev) {
  const answers = q.answers || {};
  const keys = Object.keys(answers);
  const fieldLabels = {
    destination_ip:'IP đích', destination_port:'Cổng đích',
    source_port:'Cổng nguồn', source_ip:'IP nguồn',
    answer:'Trả lời',
  };
  let html = '<div class="fill-inputs">';
  keys.forEach(k => {
    const label = fieldLabels[k] || k;
    const ua = prev?.userAnswer?.[k] || '';
    const correct = answers[k];
    let inputCls = 'fill-input';
    if (prev && ua) inputCls += ua.trim().toLowerCase() === correct.trim().toLowerCase() ? ' correct-in' : ' wrong-in';
    html += `<div class="fill-row">
      <div class="fill-label">${escH(label)}${prev && ua !== correct ? ` (đúng: ${escH(correct)})` : ''}</div>
      <input class="${inputCls}" id="fill-${k}" type="text" placeholder="Nhập câu trả lời..."
        value="${escH(prev ? ua : (ST.tempSel[q.id]?.[k]||''))}"
        oninput="updateFill('${k}',this.value)"
        ${prev?'disabled':''}>
    </div>`;
  });
  return html + '</div>';
}

function updateFill(key, val) {
  const q = ST.questions[ST.idx];
  if (!ST.tempSel[q.id]) ST.tempSel[q.id] = {};
  ST.tempSel[q.id][key] = val;
}

function restoreTempSel(q) { /* selections handled in render via ST.tempSel */ }

// ═══════════════════════════════════════════════
// CHECK ANSWER
// ═══════════════════════════════════════════════
function checkAnswer() {
  const q = ST.questions[ST.idx];
  const has = hasKnownAnswer(q);
  let userAnswer = null, correct = null;

  if (q.type === 'mcq') {
    userAnswer = ST.tempSel[q.id] || [];
    if (userAnswer.length === 0 && q.options && q.options.length > 0) {
      alert('Hãy chọn đáp án!'); return;
    }
    if (!has) { correct = null; }
    else if (q.multi) {
      const ua = [...userAnswer].sort();
      const na = [...(q.answer||[])].sort();
      correct = JSON.stringify(ua) === JSON.stringify(na);
    } else {
      correct = userAnswer[0] === q.answer?.[0];
    }
  } else if (q.type === 'true_false' && q.subtype === 'simple_tf') {
    userAnswer = ST.tempSel[q.id];
    if (!userAnswer) { alert('Hãy chọn Đúng hoặc Sai!'); return; }
    correct = has ? (userAnswer === q.answer) : null;
  } else if (q.type === 'true_false' && q.subtype === 'multi_tf') {
    userAnswer = ST.tempSel[q.id] || {};
    const items = q.items || [];
    if (items.length > 0 && Object.keys(userAnswer).length === 0) {
      alert('Hãy chọn ít nhất một đáp án!'); return;
    }
    if (!has) { correct = null; }
    else {
      let allCorrect = true, anyCorrect = false;
      items.forEach(item => {
        const ua = userAnswer[item.key];
        const ca = q.answer?.[item.key];
        if (ua === ca) anyCorrect = true;
        else allCorrect = false;
      });
      correct = allCorrect ? true : anyCorrect ? 'partial' : false;
    }
  } else if (q.type === 'matching') {
    userAnswer = ST.tempSel[q.id] || {};
    const allSet = q.matches.every((_, i) => userAnswer[i]);
    if (!allSet) { alert('Hãy ghép tất cả các mục!'); return; }
    let allC = true;
    q.matches.forEach((m, i) => { if (userAnswer[i] !== m.answer_key) allC = false; });
    correct = allC;
  } else if (q.type === 'fill_in') {
    userAnswer = ST.tempSel[q.id] || {};
    correct = null; // self-evaluated
  }

  ST.answers[q.id] = { userAnswer, correct, skipped: false };
  ST.tempSel[q.id] = userAnswer; // keep for display
  renderQuestion();
}

function skipQuestion() {
  const q = ST.questions[ST.idx];
  ST.answers[q.id] = { userAnswer: null, correct: null, skipped: true };
  ST.tempSel = { ...ST.tempSel };
  nextQuestion();
}

function nextQuestion() {
  if (ST.idx < ST.questions.length - 1) {
    ST.idx++;
    renderQuestion();
  } else {
    finishQuiz();
  }
}

function prevQuestion() {
  if (ST.idx > 0) {
    ST.idx--;
    renderQuestion();
  }
}

// ═══════════════════════════════════════════════
// FINISH
// ═══════════════════════════════════════════════
function finishQuiz() {
  stopTimer();
  const qs = ST.questions;
  const total = qs.length;
  const answered = Object.keys(ST.answers).length;
  const graded = Object.values(ST.answers).filter(a => a.correct !== null && !a.skipped);
  const correct = graded.filter(a => a.correct === true).length;
  const partial = graded.filter(a => a.correct === 'partial').length;
  const gradedN = graded.length;
  const skipped = Object.values(ST.answers).filter(a => a.skipped).length;
  const wrong = graded.filter(a => a.correct === false).length;
  const pct = gradedN > 0 ? Math.round((correct + partial*0.5) / gradedN * 100) : 0;
  const timeStr = document.getElementById('timer-display').textContent;

  // Save
  const attempt = {
    week: ST.week,
    label: getWeekLabel(ST.week),
    date: new Date().toISOString(),
    total, answered, graded: gradedN, correct, partial, wrong, skipped, pct,
    time: timeStr,
  };
  ST.attempts.unshift(attempt);
  if (ST.attempts.length > 200) ST.attempts.pop();
  localStorage.setItem('nq_v2_attempts', JSON.stringify(ST.attempts));

  const prev = getWeekProg(ST.week);
  ST.weekProg[ST.week] = {
    done: answered, total, correct,
    attempts: (prev.attempts||0) + 1,
    bestPct: Math.max(prev.bestPct||0, pct),
  };
  localStorage.setItem('nq_v2_prog', JSON.stringify(ST.weekProg));

  showScreen('result');
  renderResult(attempt);
  renderWeekNav();
  renderHomeGrid();
  renderGlobalSidebar();
}

function renderResult(a) {
  const pct = a.pct;
  const color = pct >= 80 ? 'var(--grn)' : pct >= 60 ? 'var(--acc)' : pct >= 40 ? 'var(--ylw)' : 'var(--red)';
  const r=60, circ=2*Math.PI*r, offset=circ-(pct/100)*circ;
  const grade = pct>=90?'Xuất sắc! 🏆':pct>=80?'Tốt lắm! 🎉':pct>=70?'Khá tốt 👍':pct>=50?'Trung bình':pct>0?'Cần ôn lại 📖':'Chưa có điểm';

  document.getElementById('result-card').innerHTML = `
    <div class="result-ring">
      <svg width="150" height="150" viewBox="0 0 150 150">
        <circle cx="75" cy="75" r="${r}" fill="none" stroke="var(--b1)" stroke-width="10"/>
        <circle cx="75" cy="75" r="${r}" fill="none" stroke="${color}" stroke-width="10"
          stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
      </svg>
      <div class="ring-text">
        <span class="ring-pct" style="color:${color}">${pct}%</span>
        <span class="ring-label">điểm</span>
      </div>
    </div>
    <div class="result-title">${grade}</div>
    <div class="result-sub">${a.label} · ${new Date(a.date).toLocaleDateString('vi-VN')} · ⏱ ${a.time}</div>
    <div class="result-grid">
      <div class="rs-stat"><div class="rs-num" style="color:var(--grn)">${a.correct}</div><div class="rs-lbl">Đúng</div></div>
      <div class="rs-stat"><div class="rs-num" style="color:var(--org)">${a.partial}</div><div class="rs-lbl">Đúng một phần</div></div>
      <div class="rs-stat"><div class="rs-num" style="color:var(--red)">${a.wrong}</div><div class="rs-lbl">Sai</div></div>
      <div class="rs-stat"><div class="rs-num" style="color:var(--ylw)">${a.skipped}</div><div class="rs-lbl">Bỏ qua</div></div>
    </div>
    <div style="font-size:.78rem;color:var(--muted)">${a.graded} câu được chấm / ${a.total} tổng câu · Thời gian: ${a.time}</div>
  `;
}

function retryQuiz() { startQuiz(ST.week); }

// ═══════════════════════════════════════════════
// STATS
// ═══════════════════════════════════════════════
function renderStats() {
  const totalQ = Object.values(DATA.weeks).reduce((s,w)=>s+w.length,0);
  const totalA = ST.attempts.length;
  const totalC = ST.attempts.reduce((s,a)=>s+(a.correct||0),0);
  const totalGr = ST.attempts.reduce((s,a)=>s+(a.graded||0),0);
  const avg = totalGr > 0 ? Math.round(totalC/totalGr*100) : 0;
  const best = ST.attempts.reduce((b,a)=>(!b||a.pct>b.pct)?a:b, null);

  const histRows = ST.attempts.slice(0,40).map(a => {
    const c = a.pct >= 80 ? 'var(--grn)' : a.pct >= 60 ? 'var(--acc)' : a.pct >= 40 ? 'var(--ylw)' : 'var(--red)';
    return `<div class="hist-row">
      <span class="hr-week">${a.label||'Tuần '+a.week}</span>
      <span class="hr-score" style="color:${c}">${a.pct}%</span>
      <div class="hr-bar"><div class="mini-bar"><div class="mini-bar-fill" style="width:${a.pct}%;background:${c}"></div></div></div>
      <span style="color:var(--muted);font-size:.72rem">${a.time||''}</span>
      <span class="hr-date">${new Date(a.date).toLocaleDateString('vi-VN')}</span>
    </div>`;
  }).join('');

  const weekCards = Object.keys(DATA.weeks).sort().map(w => {
    const prog = getWeekProg(w);
    const pct = prog.bestPct||0;
    const c = pct>=80?'var(--grn)':pct>=50?'var(--acc)':pct>0?'var(--ylw)':'var(--muted)';
    const wAttempts = ST.attempts.filter(a=>String(a.week)===w);
    return `<div class="sc" style="cursor:pointer" onclick="startQuiz('${w}')">
      <h4>${WEEK_ICONS[w]||'📋'} ${getWeekLabel(w)}</h4>
      <div class="sn" style="color:${c}">${pct>0?pct+'%':'--'}</div>
      <div class="sl">${wAttempts.length} lần · ${DATA.weeks[w].length} câu</div>
      <div class="sb-prog" style="margin-top:10px"><div class="sb-prog-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  document.getElementById('stats-content').innerHTML = `
    <div class="stats-top">
      <div class="sc"><h4>TỔNG CÂU HỎI</h4><div class="sn">${totalQ}</div><div class="sl">4 tuần học</div></div>
      <div class="sc"><h4>LƯỢT THI</h4><div class="sn">${totalA}</div><div class="sl">Tất cả các tuần</div></div>
      <div class="sc"><h4>TỈ LỆ ĐÚNG TB</h4><div class="sn" style="color:${avg>=70?'var(--grn)':'var(--acc)'}">${totalGr>0?avg+'%':'--'}</div><div class="sl">${totalGr} câu chấm</div></div>
      ${best?`<div class="sc"><h4>ĐIỂM CAO NHẤT</h4><div class="sn" style="color:var(--ylw)">${best.pct}%</div><div class="sl">${best.label||'Tuần '+best.week}</div></div>`:''}
    </div>
    <h3 style="font-family:'Space Mono',monospace;font-size:.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:14px">TIẾN ĐỘ TỪNG TUẦN</h3>
    <div class="stats-top" style="margin-bottom:28px">${weekCards}</div>
    ${totalA > 0 ? `
    <div class="hist-table">
      <h3>LỊCH SỬ THI (${Math.min(totalA,40)} gần nhất)</h3>
      ${histRows}
    </div>
    <div style="margin-top:16px;text-align:center">
      <button class="btn btn-danger" onclick="clearStats()">🗑️ Xóa toàn bộ lịch sử</button>
    </div>` : '<div class="empty-state"><div class="ei">📋</div><h3>Chưa có lịch sử thi</h3><p>Bắt đầu làm bài để xem thống kê ở đây.</p></div>'}
  `;
}

function clearStats() {
  if (!confirm('Xóa toàn bộ lịch sử? Không thể hoàn tác.')) return;
  ST.attempts = [];
  ST.weekProg = {};
  localStorage.removeItem('nq_v2_attempts');
  localStorage.removeItem('nq_v2_prog');
  renderStats();
  renderWeekNav();
  renderHomeGrid();
  renderGlobalSidebar();
}

// Start
init();
</script>
</body>
</html>
